name: Agent Audit Report

on:
  # Manual trigger only - run this whenever you need a fresh audit
  workflow_dispatch:

jobs:
  audit:
    name: Generate agent audit report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openpyxl thefuzz python-Levenshtein

      - name: Run audit
        env:
          INTERCOM_TOKEN:    ${{ secrets.INTERCOM_TOKEN }}
          ASSEMBLED_API_KEY: ${{ secrets.ASSEMBLED_API_KEY }}
        run: python audit.py

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: agent-audit-report
          path: agent_audit.xlsx
          retention-days: 30
        
