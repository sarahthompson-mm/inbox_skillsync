name: People Audit Report

on:
  workflow_dispatch:

jobs:
  audit:
    name: Generate people audit report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run people audit
        env:
          ASSEMBLED_API_KEY: ${{ secrets.ASSEMBLED_API_KEY }}
        run: python staffable_debug.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: people-audit-report
          path: people_audit.xlsx
          retention-days: 30
